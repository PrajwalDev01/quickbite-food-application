<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>QuickBite Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:linear-gradient(135deg, #fdfcfb, #e2d1c3, #c9d6ff, #e2e2e2);
}

.login-box{
    background:#ffffff;
    width:90%;
    max-width:400px;
    padding:35px;
    border-radius:15px;
    box-shadow:0 10px 25px rgba(0,0,0,0.15);
}

.login-box h2{
    text-align:center;
    color:black;
    margin-bottom:15px;
}

.subtitle{
    text-align:center;
    color:#666;
    font-size:14px;
    line-height:1.5;
    margin-bottom:25px;
}

label{
    display:block;
    margin-bottom:8px;
    color:#444;
    font-weight:bold;
}

input{
    width:100%;
    padding:12px;
    margin-bottom:18px;
    border:1px solid #ddd;
    border-radius:8px;
    font-size:14px;
    transition:0.3s;
}

input:focus{
    outline:none;
    border-color:#ffd700;
    box-shadow:0 0 5px rgba(255,215,0,0.4);
}

.forgot-password{
    text-align:right;
    margin-top:-10px;
    margin-bottom:15px;
}

.forgot-password a{
    text-decoration:none;
    color:#1a237e;
    font-size:14px;
}

.forgot-password a:hover{
    text-decoration:underline;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:linear-gradient(135deg, black, #3949ab);
    color:white;
    font-size:16px;
    font-weight:bold;
    cursor:pointer;
    transition:0.3s;
}

button:hover{
    background:black;
    transform:translateY(-3px);
}

.signup-link{
    margin-top:20px;
    text-align:center;
    font-size:14px;
    color:#555;
    line-height:1.6;
}

.signup-link a{
    color:#1a237e;
    text-decoration:none;
    font-weight:bold;
}

.signup-link a:hover{
    text-decoration:underline;
}
</style>
</head>

<body>

<div class="login-box">

    <h2>🔐 Welcome Back to QuickBite 🍴</h2>

  <p class="subtitle">
  Sign in to enjoy meals, offers, and fast delivery
</p>


    <form action="login" method="post">

        <label for="userName">👤 Username</label>
        <input type="text"
               id="userName"
               name="userName"
               placeholder="Enter your username"
               required>

        <label for="password">🔑 Password</label>
        <input type="password"
               id="password"
               name="password"
               placeholder="Enter your password"
               required>

        <div class="forgot-password">
            <a href="forgotPassword.html">Forgot Password?</a>
        </div>

        <button type="submit">🍔 Login to QuickBite</button>

    </form>

    <div class="signup-link">
      <p>
  ✨ New to QuickBite? <a href="register.html">Sign up</a> 🍽️
</p>

    </div>

</div>

</body>
</html>
